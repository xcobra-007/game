name: Build iOS IPA

# Builds the دومنة المناويج iOS app (Capacitor wrapper around dominoes.html)
# on a macOS runner and uploads the resulting .ipa as a downloadable artifact.
#
# Two modes (chosen automatically):
#   * UNSIGNED  (default, no setup) -> always produces build/ipa/App-unsigned.ipa.
#                Install it later with a free signing tool such as AltStore or
#                Sideloadly, which re-signs with your own Apple ID on the device.
#   * SIGNED    -> if the Apple signing secrets below are configured, it also
#                exports a properly signed .ipa via xcodebuild -exportArchive.
#
# Optional repository secrets for a SIGNED build:
#   APPLE_TEAM_ID                 10-char Apple Developer Team ID
#   BUILD_CERTIFICATE_BASE64      base64 of your Apple distribution .p12
#   P12_PASSWORD                  password for that .p12
#   PROVISIONING_PROFILE_BASE64   base64 of a matching .mobileprovision
#   EXPORT_METHOD                 development | ad-hoc | app-store (default: development)
#
# Run it manually from the GitHub "Actions" tab (Run workflow), or it runs on
# pushes that touch the game / iOS project.

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'dominoes.html'
      - 'ios-app/**'
      - '.github/workflows/build-ios-ipa.yml'

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: ios-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies
        run: npm install

      - name: Sync web game + Capacitor (installs CocoaPods)
        run: npm run prepare-ios

      - name: Determine build mode
        id: mode
        run: |
          if [ -n "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" ] && [ -n "${{ secrets.APPLE_TEAM_ID }}" ]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "Signing secrets detected -> SIGNED build."
          else
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "No signing secrets -> UNSIGNED build."
          fi

      # ---------------------------------------------------------------
      # UNSIGNED build (default): archive with signing disabled, then
      # hand-package the .app into a Payload/ folder zipped as an .ipa.
      # ---------------------------------------------------------------
      - name: Archive (unsigned)
        if: steps.mode.outputs.signed == 'false'
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Package unsigned .ipa
        if: steps.mode.outputs.signed == 'false'
        run: |
          set -euo pipefail
          APP_PATH="$(ls -d build/App.xcarchive/Products/Applications/*.app | head -n1)"
          echo "Packaging: $APP_PATH"
          rm -rf build/Payload build/ipa
          mkdir -p build/Payload build/ipa
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry ipa/App-unsigned.ipa Payload)
          rm -rf build/Payload
          echo "Created:"
          ls -lh build/ipa

      # ---------------------------------------------------------------
      # SIGNED build: import cert + profile into a temporary keychain,
      # then archive + export a real .ipa.
      # ---------------------------------------------------------------
      - name: Import signing assets
        if: steps.mode.outputs.signed == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" "$KEYCHAIN_PATH" >/dev/null

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Write ExportOptions.plist
        if: steps.mode.outputs.signed == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          EXPORT_METHOD: ${{ secrets.EXPORT_METHOD }}
        run: |
          set -euo pipefail
          METHOD="${EXPORT_METHOD:-development}"
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${METHOD}</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          cat ExportOptions.plist

      - name: Archive + export signed .ipa
        if: steps.mode.outputs.signed == 'true'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          rm -rf build/App.xcarchive build/ipa
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            clean archive
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist
          echo "Created:"
          ls -lh build/ipa

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: dominoes-ios-ipa
          path: ios-app/build/ipa/*.ipa
          if-no-files-found: error
          retention-days: 30
