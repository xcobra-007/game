plugins {
    id 'com.android.application'
}

android {
    namespace 'com.manawij.dominoes'
    compileSdk 34

    defaultConfig {
        applicationId 'com.manawij.dominoes'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

// Always bundle the latest game file from the repo root into the app's assets,
// so the APK is never built against a stale copy of dominoes.html.
tasks.register('syncGameHtml', Copy) {
    from rootProject.file('../dominoes.html')
    into 'src/main/assets'
}
tasks.named('preBuild') {
    dependsOn 'syncGameHtml'
}
